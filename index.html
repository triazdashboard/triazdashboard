<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Allianz Trade - Energy Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5"></script>
  <link rel="stylesheet" href="dashboard-theme.css"/>
  <style>
    .t-main { min-height: 0; display: flex; flex-direction: column; }
    #loading  { flex: 1; }
    #dashboard {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: 1fr;
      gap: 10px;
    }
    .card { display: flex; flex-direction: column; min-height: 0; }

    /* ── Mega-card body (flex column, 3 sections stacked) ── */
    .mega-body { display: flex !important; flex-direction: column; overflow: hidden; }
    .mega-section {
      flex: 1; min-height: 0; position: relative; overflow: hidden;
    }
    .mega-section.mega-ratio {
      flex: 0 0 32%;
      display: flex; flex-direction: row; overflow: hidden;
    }
    .mega-divider { flex-shrink: 0; height: 1px; background: rgba(255,255,255,0.07); }

    /* ── Calendar icon overlay ── */
    .cal-icon {
      position: absolute; top: 8px; right: 10px;
      width: 46px; height: 46px;
      fill: none;
      stroke: rgba(255,255,255,0.75);
      stroke-linecap: round; stroke-linejoin: round; stroke-width: 2.2;
      z-index: 2; pointer-events: none;
    }

    /* ── Ratio gauge section internals ── */
    .mega-ratio > .chart { flex: 0 0 46%; min-width: 0; }
    .ratio-kpis {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: flex-start; justify-content: center;
      gap: 18px; padding: 10px 14px 10px 14px;
      border-left: 1px solid rgba(255,255,255,0.07);
    }
    .ratio-kpi { display: flex; align-items: center; gap: 13px; width: 100%; }
    .ratio-kpi-icon {
      flex-shrink: 0; width: 36px; height: 36px;
      fill: rgba(255,255,255,0.82);
      filter: drop-shadow(0 0 4px rgba(255,255,255,0.18));
    }
    .ratio-kpi-icon.cyan { fill: #45d4ff; filter: drop-shadow(0 0 5px rgba(69,212,255,0.5)); }
    .ratio-kpi-info { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
    .ratio-kpi-value { font-size: 22px; font-weight: 700; line-height: 1.1; white-space: nowrap; }
    .ratio-kpi-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
  </style>
</head>

  <script>
    const COLORS = {
      total: '#4c7dff',
      fv: '#33d17a',
      frigo: '#ff9f43',
      mensa: '#33d17a',
      charger: '#f6c344',
      edificio: '#a78bfa',
      cyan: '#45d4ff',
      grid: 'rgba(255,255,255,0.08)',
      text: '#f4f8ff',
      muted: '#b2c3de'
    };

    const CACHE_BUSTER = Date.now();

    async function fetchJson(path) {
      const separator = path.includes('?') ? '&' : '?';
      const url = `${path}${separator}v=${CACHE_BUSTER}`;
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(`Errore nel caricamento di ${path} (${res.status})`);
      return res.json();
    }

    function formatTimestamp(value) {
      if (!value) return null;
      const normalized = String(value).replace(' ', 'T');
      const date = new Date(normalized);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString('it-IT', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    function buildRatioChart(el, kpisId, data) {
      const chart = echarts.init(document.getElementById(el));
      const consumo = Number(data?.totale_vs_fv?.consumo || 0);
      const fv = Number(data?.totale_vs_fv?.fotovoltaico || 0);
      const ev = (data?.consumo_parziale?.series?.['Ricarica Auto Elettriche'] || [])
        .reduce(function(a, b){ return a + b; }, 0);
      const co2 = (fv * 0.75 * 0.35) + (ev * 0.1);
      const balance = consumo > 0 ? Math.min((fv / consumo) * 100, 100) : 0;

      function fmtEnergy(n) {
        if (n >= 1000) return (n / 1000).toFixed(1) + ' MWh';
        return Math.round(n) + ' kWh';
      }
      function fmtCo2(n) {
        if (n >= 1000) return (n / 1000).toFixed(1) + ' t';
        return n.toFixed(1) + ' kg';
      }

      var kpisDiv = document.getElementById(kpisId);
      if (kpisDiv) {
        kpisDiv.innerHTML =
          '<div class="ratio-kpi">' +
            '<svg class="ratio-kpi-icon cyan" viewBox="0 0 496 496"><use href="#icon-ev"/></svg>' +
            '<div class="ratio-kpi-info">' +
              '<span class="ratio-kpi-value" style="color:#45d4ff">' + fmtEnergy(ev) + '</span>' +
              '<span class="ratio-kpi-label">Ricariche EV</span>' +
            '</div>' +
          '</div>' +
          '<div class="ratio-kpi">' +
            '<svg class="ratio-kpi-icon" style="fill:#33d17a" viewBox="0 0 32 32"><use href="#icon-co2"/></svg>' +
            '<div class="ratio-kpi-info">' +
              '<span class="ratio-kpi-value" style="color:#33d17a">' + fmtCo2(co2) + '</span>' +
              '<span class="ratio-kpi-label">CO\u2082 Evitata</span>' +
            '</div>' +
          '</div>';
      }
      chart.setOption({
        backgroundColor: 'transparent',
        animationDuration: 1200,
        title: {
          text: `${balance.toFixed(0)}%`,
          left: 'center', top: '46%',
          textStyle: { color: COLORS.text, fontSize: 28, fontWeight: 500 }
        },
        tooltip: { trigger: 'item', backgroundColor: 'rgba(7,17,31,0.96)', borderWidth: 0, textStyle: { color: '#fff' } },
        series: [
          {
            name: 'Consumo Totale', type: 'gauge',
            center: ['50%', '50%'], radius: '78%',
            startAngle: 220, endAngle: -40, min: 0, max: Math.max(consumo, 1),
            progress: { show: true, width: 18, itemStyle: { color: COLORS.total, shadowBlur: 20, shadowColor: 'rgba(76,125,255,0.45)' } },
            pointer: { show: false },
            axisLine: { lineStyle: { width: 18, color: [[1, 'rgba(255,255,255,0.06)']] } },
            axisTick: { show: false }, splitLine: { show: false }, axisLabel: { show: false },
            detail: { show: false }, anchor: { show: false },
            data: [{ value: consumo }]
          },
          {
            name: 'Fotovoltaico', type: 'gauge',
            center: ['50%', '50%'], radius: '56%',
            startAngle: 220, endAngle: -40, min: 0, max: Math.max(consumo, 1),
            progress: { show: true, width: 16, itemStyle: { color: '#f6c344', shadowBlur: 20, shadowColor: 'rgba(246,195,68,0.45)' } },
            pointer: { show: false },
            axisLine: { lineStyle: { width: 16, color: [[1, 'rgba(255,255,255,0.05)']] } },
            axisTick: { show: false }, splitLine: { show: false }, axisLabel: { show: false },
            detail: { show: false }, anchor: { show: false },
            data: [{ value: fv }]
          }
        ]
      });

      // Overlay: solar icon top-left, consumo bottom-left, FV bottom-right
      var chartEl = document.getElementById(el);
      chartEl.style.position = 'relative';
      var iconOv = document.createElement('div');
      iconOv.style.cssText = 'position:absolute;top:8px;left:8px;z-index:1;pointer-events:none;line-height:0;';
      iconOv.innerHTML = '<svg style="width:34px;height:34px;fill:#f6c344;filter:drop-shadow(0 0 6px rgba(246,195,68,0.6))" viewBox="0 0 260 244"><use href="#icon-solar"/></svg>';
      chartEl.appendChild(iconOv);
      var consumoOv = document.createElement('div');
      consumoOv.style.cssText = 'position:absolute;bottom:8px;left:10px;z-index:1;pointer-events:none;line-height:1.2;';
      consumoOv.innerHTML =
        '<div style="font-size:9px;font-weight:600;color:#b2c3de;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:2px;">Consumo Totale</div>' +
        '<div style="font-size:13px;font-weight:700;color:#4c7dff;letter-spacing:0.02em;">' + fmtEnergy(consumo) + '</div>';
      chartEl.appendChild(consumoOv);
      var fvOv = document.createElement('div');
      fvOv.style.cssText = 'position:absolute;bottom:8px;right:10px;z-index:1;pointer-events:none;line-height:1.2;text-align:right;';
      fvOv.innerHTML =
        '<div style="font-size:9px;font-weight:600;color:#b2c3de;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:2px;">Produzione FV</div>' +
        '<div style="font-size:13px;font-weight:700;color:#f6c344;letter-spacing:0.02em;">' + fmtEnergy(fv) + '</div>';
      chartEl.appendChild(fvOv);

      return chart;
    }

    function buildTotalChart(el, data, title) {
      const chart = echarts.init(document.getElementById(el));
      const labels = (data?.consumo_totale || []).map(x => x.label);
      const values = (data?.consumo_totale || []).map(x => Number(x.value || 0));
      const fvValues = (data?.fotovoltaico_totale || []).map(x => Number(x.value || 0));
      const hasFv = fvValues.length > 0;

      const series = [
        {
          name: 'Consumo Totale', type: 'line', smooth: true,
          symbol: 'circle', symbolSize: 6, data: values,
          lineStyle: { width: 3, color: COLORS.total },
          itemStyle: { color: COLORS.total },
          areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
            { offset: 0, color: 'rgba(76,125,255,0.45)' },
            { offset: 1, color: 'rgba(76,125,255,0.02)' }
          ])},
          markLine: { silent: true, symbol: 'none', lineStyle: { color: 'rgba(255,255,255,0.10)', type: 'dashed' }, label: { show: false }, data: [{ type: 'average' }] }
        }
      ];

      if (hasFv) {
        series.push({
          name: 'Fotovoltaico', type: 'line', smooth: true,
          symbol: 'circle', symbolSize: 6, data: fvValues,
          lineStyle: { width: 3, color: '#f6c344' },
          itemStyle: { color: '#f6c344', borderColor: '#7a5800', borderWidth: 2 },
          areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
            { offset: 0, color: 'rgba(246,195,68,0.35)' },
            { offset: 1, color: 'rgba(246,195,68,0.02)' }
          ])}
        });
      }

      chart.setOption({
        backgroundColor: 'transparent',
        animationDuration: 900,
        legend: hasFv ? {
          top: 4, right: 12,
          itemGap: 14, itemWidth: 10, itemHeight: 10,
          textStyle: { color: COLORS.muted, fontSize: 11 }
        } : { show: false },
        tooltip: {
          trigger: 'axis', backgroundColor: 'rgba(7,17,31,0.96)', borderWidth: 0,
          textStyle: { color: '#fff' },
          formatter: params => params.map(p =>
            `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.color};margin-right:5px"></span>${p.seriesName}: <b>${p.value}</b> kWh`
          ).join('<br/>')
        },
        grid: { left: 55, right: 18, top: hasFv ? 32 : 20, bottom: 38 },
        xAxis: {
          type: 'category', data: labels, boundaryGap: false,
          axisLabel: { color: COLORS.muted, fontSize: 13, hideOverlap: true },
          axisLine: { lineStyle: { color: 'rgba(255,255,255,0.12)' } },
          splitLine: { show: true, lineStyle: { color: 'rgba(255,255,255,0.06)', type: 'dashed' } }
        },
        yAxis: {
          type: 'value',
          axisLabel: { color: COLORS.muted, fontSize: 13, hideOverlap: true },
          splitLine: { lineStyle: { color: COLORS.grid } }
        },
        series
      });
      return chart;
    }

    function buildPartialChart(el, data) {
      const chart = echarts.init(document.getElementById(el));
      const labels = data?.consumo_parziale?.labels || [];
      const seriesData = data?.consumo_parziale?.series || {};
      const series = [];
      const seriesMap = [
        { key: 'Consumo Gruppi Frigo',     color: COLORS.frigo },
        { key: 'Consumo Mensa',            color: COLORS.mensa },
        { key: 'Ricarica Auto Elettriche', color: COLORS.cyan },
        { key: 'Consumo Edificio',         color: COLORS.edificio }
      ];
      for (const entry of seriesMap) {
        if (seriesData[entry.key]) {
          series.push({
            name: entry.key, type: 'line', smooth: true,
            symbol: 'circle', symbolSize: 5,
            data: seriesData[entry.key].map(v => Number(v || 0)),
            lineStyle: { width: 3, color: entry.color },
            itemStyle: { color: entry.color, borderWidth: 2 },
            showSymbol: false, emphasis: { focus: 'series' }
          });
        }
      }
      chart.setOption({
        backgroundColor: 'transparent',
        animationDuration: 900,
        tooltip: { trigger: 'axis', backgroundColor: 'rgba(7,17,31,0.96)', borderWidth: 0, textStyle: { color: '#fff' } },
        legend: {
          bottom: 4, itemGap: 16, itemWidth: 12, itemHeight: 12,
          textStyle: { color: COLORS.muted, fontSize: 11 },
          formatter: name => ({ 'Consumo Gruppi Frigo': 'Gruppi Frigo', 'Consumo Mensa': 'Mensa', 'Ricarica Auto Elettriche': 'Ricarica Auto', 'Consumo Edificio': 'Edificio' }[name] || name)
        },
        grid: { left: 55, right: 18, top: 16, bottom: 52 },
        xAxis: {
          type: 'category', data: labels, boundaryGap: false,
          axisLabel: { color: COLORS.muted, fontSize: 12, hideOverlap: true },
          axisLine: { lineStyle: { color: 'rgba(255,255,255,0.12)' } },
          splitLine: { show: true, lineStyle: { color: 'rgba(255,255,255,0.04)' } }
        },
        yAxis: {
          type: 'value',
          axisLabel: { color: COLORS.muted, fontSize: 12 },
          splitLine: { lineStyle: { color: COLORS.grid } }
        },
        series
      });
      return chart;
    }

    async function init() {
      const results = await Promise.allSettled([
        fetchJson('./data/24h.json'),
        fetchJson('./data/7d.json'),
        fetchJson('./data/30d.json')
      ]);
      const failed = results.filter(r => r.status === 'rejected');
      if (failed.length) throw new Error(`Caricamento dati incompleto (${failed.length}/3 file mancanti o non validi)`);

      const [d24, d7, d30] = results.map(r => r.value);
      const lastUpdated = [d24.updated_at, d7.updated_at, d30.updated_at].filter(Boolean).sort().slice(-1)[0];
      const formattedUpdate = formatTimestamp(lastUpdated);
      document.getElementById('tUpdate').textContent =
        formattedUpdate ? `Ultimo aggiornamento: ${formattedUpdate}` : 'Dati aggiornati';

      document.getElementById('loading').style.display = 'none';
      document.getElementById('dashboard').style.display = 'grid';

      const charts = [];
      charts.push(buildRatioChart('chart-ratio-24h', 'kpis-ratio-24h', d24));
      charts.push(buildRatioChart('chart-ratio-7d', 'kpis-ratio-7d', d7));
      charts.push(buildRatioChart('chart-ratio-30d', 'kpis-ratio-30d', d30));
      charts.push(buildTotalChart('chart-total-24h', d24, 'Consumo Totale'));
      charts.push(buildTotalChart('chart-total-7d', d7, 'Consumo Totale'));
      charts.push(buildTotalChart('chart-total-30d', d30, 'Consumo Totale'));
      charts.push(buildPartialChart('chart-partial-24h', d24));
      charts.push(buildPartialChart('chart-partial-7d', d7));
      charts.push(buildPartialChart('chart-partial-30d', d30));

      requestAnimationFrame(() => charts.forEach(c => c.resize()));
      window.addEventListener('resize', () => charts.forEach(c => c.resize()));
    }

    init().catch(err => {
      document.getElementById('loading').textContent = `Errore caricamento dashboard: ${err.message}`;
      console.error(err);
    });

    setTimeout(() => location.reload(), 60 * 60 * 1000);
  </script>
</body>
</html>
