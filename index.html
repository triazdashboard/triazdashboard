<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Allianz Trade – Statistiche Consumi · Ieri</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5"></script>
  <link rel="stylesheet" href="dashboard-theme.css"/>
  <style>
    /* ── Main: CSS Grid → il card riceve un'altezza definita dal track 1fr ── */
    .t-main { display:grid; grid-template-rows:1fr; min-height:0; }
    .card { display:flex; flex-direction:column; min-height:0; }

    /* ── Mega-card body: 2 colonne (sinistra: gauge+kpi | destra: total/partial) ── */
    .mega-body { display:flex !important; flex-direction:row; overflow:hidden; }
    .mega-left {
      flex:0 0 30%; display:flex; flex-direction:column;
      border-right:1px solid rgba(255,255,255,0.07);
      min-height:0; min-width:0; overflow:hidden;
    }
    .mega-gauge {
      flex:0 0 42%; position:relative; min-height:0; overflow:hidden;
      border-bottom:1px solid rgba(255,255,255,0.07);
      padding-bottom:6px;
    }
    .mega-right { flex:1; display:flex; flex-direction:column; min-height:0; min-width:0; overflow:hidden; }
    .mega-right-top    { flex:1; position:relative; min-height:0; overflow:hidden; }
    .mega-hdivider     { flex-shrink:0; height:1px; background:rgba(255,255,255,0.07); }
    .mega-right-bottom { flex:1; position:relative; min-height:0; overflow:hidden; }

    /* ── Calendar icon overlay ── */
    .cal-icon {
      position:absolute; top:8px; right:10px; width:40px; height:40px;
      fill:none; stroke:rgba(255,255,255,0.75);
      stroke-linecap:round; stroke-linejoin:round; stroke-width:2.2;
      z-index:2; pointer-events:none;
    }

    /* ── KPI panel ── */
    .ratio-kpis {
      flex:1; display:grid; grid-template-columns:1fr 1fr;
      align-content:center; justify-items:center;
      padding:14px 18px; gap:24px 8px;
    }
    .ratio-kpi { display:flex; flex-direction:column; align-items:center; text-align:center; gap:8px; }
    .ratio-kpi-icon { flex-shrink:0; width:54px; height:54px; fill:rgba(255,255,255,0.82); filter:drop-shadow(0 0 4px rgba(255,255,255,0.18)); }
    .ratio-kpi-icon.blue   { fill:#4c7dff; filter:drop-shadow(0 0 6px rgba(76,125,255,0.5)); }
    .ratio-kpi-icon.yellow { fill:#f6c344; filter:drop-shadow(0 0 6px rgba(246,195,68,0.5)); }
    .ratio-kpi-icon.cyan   { fill:#45d4ff; filter:drop-shadow(0 0 6px rgba(69,212,255,0.5)); }
    .ratio-kpi-icon.green  { fill:#33d17a; filter:drop-shadow(0 0 6px rgba(51,209,122,0.5)); }
    .ratio-kpi-info { display:flex; flex-direction:column; gap:3px; min-width:0; align-items:center; }
    .ratio-kpi-value { font-size:27px; font-weight:700; line-height:1.1; white-space:nowrap; }
    .ratio-kpi-label { font-size:13px; font-weight:600; color:var(--muted); letter-spacing:0.06em; text-transform:uppercase; }
  </style>
</head>

<script>
  // TV viewport fix
  (function() {
    function applyViewport() {
      document.body.style.width  = window.innerWidth  + 'px';
      document.body.style.height = window.innerHeight + 'px';
    }
    applyViewport();
    window.addEventListener('resize', applyViewport);
  }());

  const COLORS = {
    total:'#4c7dff', fv:'#33d17a', frigo:'#ff9f43', mensa:'#33d17a',
    charger:'#f6c344', edificio:'#a78bfa', cyan:'#45d4ff',
    grid:'rgba(255,255,255,0.08)', text:'#f4f8ff', muted:'#b2c3de'
  };

  async function fetchJson(path) {
    const url = path + (path.includes('?') ? '&' : '?') + 'v=' + Date.now();
    const r = await fetch(url, { cache:'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status + ' su ' + path);
    return r.json();
  }

  function formatTimestamp(value) {
    if (!value) return null;
    const d = new Date(String(value).replace(' ', 'T'));
    if (isNaN(d.getTime())) return value;
    return d.toLocaleString('it-IT', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  const chartByEl = new Map();
  const resizeObserver = new ResizeObserver(function(entries) {
    entries.forEach(function(e) { const c = chartByEl.get(e.target); if (c) c.resize(); });
  });
  function reg(el, chart) { chartByEl.set(el, chart); resizeObserver.observe(el); return chart; }

  /* ── Ratio / Gauge ── */
  function buildRatioChart(el, kpisId, data) {
    const chart = echarts.init(document.getElementById(el));
    const consumo = Number(data?.totale_vs_fv?.consumo || 0);
    const fv = Number(data?.totale_vs_fv?.fotovoltaico || 0);
    const ev = (data?.consumo_parziale?.series?.['Ricarica Auto Elettriche'] || [])
      .reduce(function(a, b){ return a + b; }, 0);
    const co2 = (fv * 0.75 * 0.35) + (ev * 0.1);
    const balance = consumo > 0 ? Math.min((fv / consumo) * 100, 100) : 0;

    function fmtEnergy(n) { return n >= 1000 ? (n/1000).toFixed(1)+' MWh' : Math.round(n)+' kWh'; }
    function fmtCo2(n)    { return n >= 1000 ? (n/1000).toFixed(1)+' t'   : n.toFixed(1)+' kg'; }

    var kpisDiv = document.getElementById(kpisId);
    if (kpisDiv) {
      kpisDiv.innerHTML =
        '<div class="ratio-kpi">' +
          '<svg class="ratio-kpi-icon blue" viewBox="0 0 48 48"><use href="#icon-electricity"/></svg>' +
          '<div class="ratio-kpi-info">' +
            '<span class="ratio-kpi-value" style="color:#4c7dff">' + fmtEnergy(consumo) + '</span>' +
            '<span class="ratio-kpi-label">Consumo Totale</span>' +
          '</div>' +
        '</div>' +
        '<div class="ratio-kpi">' +
          '<svg class="ratio-kpi-icon yellow" viewBox="0 0 260 244"><use href="#icon-solar"/></svg>' +
          '<div class="ratio-kpi-info">' +
            '<span class="ratio-kpi-value" style="color:#f6c344">' + fmtEnergy(fv) + '</span>' +
            '<span class="ratio-kpi-label">Produzione FV</span>' +
          '</div>' +
        '</div>' +
        '<div class="ratio-kpi">' +
          '<svg class="ratio-kpi-icon cyan" viewBox="0 0 496 496"><use href="#icon-ev"/></svg>' +
          '<div class="ratio-kpi-info">' +
            '<span class="ratio-kpi-value" style="color:#45d4ff">' + fmtEnergy(ev) + '</span>' +
            '<span class="ratio-kpi-label">Ricariche EV</span>' +
          '</div>' +
        '</div>' +
        '<div class="ratio-kpi">' +
          '<svg class="ratio-kpi-icon green" viewBox="0 0 32 32"><use href="#icon-co2"/></svg>' +
          '<div class="ratio-kpi-info">' +
            '<span class="ratio-kpi-value" style="color:#33d17a">' + fmtCo2(co2) + '</span>' +
            '<span class="ratio-kpi-label">CO\u2082 Evitata</span>' +
          '</div>' +
        '</div>';
    }

    chart.setOption({
      backgroundColor: 'transparent', animationDuration: 1200,
      title: { text: balance.toFixed(0)+'%', left:'center', top:'46%',
        textStyle:{ color:COLORS.text, fontSize:28, fontWeight:500 } },
      tooltip: { trigger:'item', backgroundColor:'rgba(7,17,31,0.96)', borderWidth:0, textStyle:{color:'#fff'} },
      series: [
        { name:'Consumo Totale', type:'gauge', center:['50%','50%'], radius:'78%',
          startAngle:220, endAngle:-40, min:0, max:Math.max(consumo,1),
          progress:{ show:true, width:18, itemStyle:{color:COLORS.total, shadowBlur:20, shadowColor:'rgba(76,125,255,0.45)'} },
          pointer:{show:false}, axisLine:{lineStyle:{width:18, color:[[1,'rgba(255,255,255,0.06)']]}},
          axisTick:{show:false}, splitLine:{show:false}, axisLabel:{show:false},
          detail:{show:false}, anchor:{show:false}, data:[{value:consumo}] },
        { name:'Fotovoltaico', type:'gauge', center:['50%','50%'], radius:'56%',
          startAngle:220, endAngle:-40, min:0, max:Math.max(consumo,1),
          progress:{ show:true, width:16, itemStyle:{color:'#f6c344', shadowBlur:20, shadowColor:'rgba(246,195,68,0.45)'} },
          pointer:{show:false}, axisLine:{lineStyle:{width:16, color:[[1,'rgba(255,255,255,0.05)']]}},
          axisTick:{show:false}, splitLine:{show:false}, axisLabel:{show:false},
          detail:{show:false}, anchor:{show:false}, data:[{value:fv}] }
      ]
    });
    return chart;
  }

  /* ── Total chart ── */
  function buildTotalChart(el, data) {
    const chart = echarts.init(document.getElementById(el));
    const labels = (data?.consumo_totale || []).map(x => x.label);
    const values = (data?.consumo_totale || []).map(x => Number(x.value || 0));
    const fvValues = (data?.fotovoltaico_totale || []).map(x => Number(x.value || 0));
    const hasFv = fvValues.length > 0;

    const series = [
      { name:'Consumo Totale', type:'line', smooth:true, symbol:'circle', symbolSize:6, data:values,
        lineStyle:{width:3, color:COLORS.total}, itemStyle:{color:COLORS.total},
        areaStyle:{color: new echarts.graphic.LinearGradient(0,0,0,1,[
          {offset:0, color:'rgba(76,125,255,0.45)'}, {offset:1, color:'rgba(76,125,255,0.02)'}])},
        markLine:{silent:true, symbol:'none', lineStyle:{color:'rgba(255,255,255,0.10)', type:'dashed'},
          label:{show:false}, data:[{type:'average'}]} }
    ];
    if (hasFv) {
      series.push({ name:'Fotovoltaico', type:'line', smooth:true, symbol:'circle', symbolSize:6, data:fvValues,
        lineStyle:{width:3, color:'#f6c344'}, itemStyle:{color:'#f6c344', borderColor:'#7a5800', borderWidth:2},
        areaStyle:{color: new echarts.graphic.LinearGradient(0,0,0,1,[
          {offset:0, color:'rgba(246,195,68,0.35)'}, {offset:1, color:'rgba(246,195,68,0.02)'}])} });
    }

    chart.setOption({
      backgroundColor:'transparent', animationDuration:900,
      legend: hasFv ? {top:4, right:12, itemGap:14, itemWidth:10, itemHeight:10,
        textStyle:{color:COLORS.muted, fontSize:11}} : {show:false},
      tooltip: { trigger:'axis', backgroundColor:'rgba(7,17,31,0.96)', borderWidth:0, textStyle:{color:'#fff'},
        formatter: params => params.map(p =>
          '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+p.color+';margin-right:5px"></span>'+
          p.seriesName+': <b>'+p.value+'</b> kWh').join('<br/>') },
      grid:{left:55, right:18, top:hasFv?32:20, bottom:38},
      xAxis:{ type:'category', data:labels, boundaryGap:false,
        axisLabel:{color:COLORS.muted, fontSize:13, hideOverlap:true},
        axisLine:{lineStyle:{color:'rgba(255,255,255,0.12)'}},
        splitLine:{show:true, lineStyle:{color:'rgba(255,255,255,0.06)', type:'dashed'}} },
      yAxis:{ type:'value',
        axisLabel:{color:COLORS.muted, fontSize:13, hideOverlap:true},
        splitLine:{lineStyle:{color:COLORS.grid}} },
      series
    });
    return chart;
  }

  /* ── Partial chart ── */
  function buildPartialChart(el, data) {
    const chart = echarts.init(document.getElementById(el));
    const labels = data?.consumo_parziale?.labels || [];
    const seriesData = data?.consumo_parziale?.series || {};
    const seriesMap = [
      { key:'Consumo Gruppi Frigo',     color:COLORS.frigo },
      { key:'Consumo Mensa',            color:COLORS.mensa },
      { key:'Ricarica Auto Elettriche', color:COLORS.cyan },
      { key:'Consumo Edificio',         color:COLORS.edificio }
    ];
    const series = [];
    for (const entry of seriesMap) {
      if (seriesData[entry.key]) {
        series.push({ name:entry.key, type:'line', smooth:true, symbol:'circle', symbolSize:5,
          data:seriesData[entry.key].map(v => Number(v||0)),
          lineStyle:{width:3, color:entry.color}, itemStyle:{color:entry.color, borderWidth:2},
          showSymbol:false, emphasis:{focus:'series'} });
      }
    }
    chart.setOption({
      backgroundColor:'transparent', animationDuration:900,
      tooltip:{trigger:'axis', backgroundColor:'rgba(7,17,31,0.96)', borderWidth:0, textStyle:{color:'#fff'}},
      legend:{ bottom:4, itemGap:26, itemWidth:12, itemHeight:12,
        textStyle:{color:COLORS.muted, fontSize:12},
        formatter: name => ({'Consumo Gruppi Frigo':'Gruppi Frigo','Consumo Mensa':'Mensa',
          'Ricarica Auto Elettriche':'Ricarica Auto','Consumo Edificio':'Edificio'}[name]||name) },
      grid:{left:55, right:18, top:16, bottom:52},
      xAxis:{ type:'category', data:labels, boundaryGap:false,
        axisLabel:{color:COLORS.muted, fontSize:12, hideOverlap:true},
        axisLine:{lineStyle:{color:'rgba(255,255,255,0.12)'}},
        splitLine:{show:true, lineStyle:{color:'rgba(255,255,255,0.04)'}} },
      yAxis:{ type:'value', axisLabel:{color:COLORS.muted, fontSize:12},
        splitLine:{lineStyle:{color:COLORS.grid}} },
      series
    });
    return chart;
  }

  /* ── Init ── */
  async function init() {
    try {
      const d = await fetchJson('./data/24h.json');
      const ts = formatTimestamp(d.updated_at);
      document.getElementById('tUpdate').textContent = ts ? 'Ultimo aggiornamento: ' + ts : 'Dati aggiornati';
      document.getElementById('loading').style.display = 'none';
      document.getElementById('mainCard').style.display = '';
      requestAnimationFrame(function() {
        reg(document.getElementById('chart-ratio'),   buildRatioChart('chart-ratio', 'kpis-ratio', d));
        reg(document.getElementById('chart-total'),   buildTotalChart('chart-total', d));
        reg(document.getElementById('chart-partial'), buildPartialChart('chart-partial', d));
      });
      setTimeout(function() { location.reload(); }, 3600000);
    } catch(err) {
      document.getElementById('loading').textContent = 'Errore: ' + err.message;
      console.error(err);
    }
  }

  init();
</script>
</body>
</html>
