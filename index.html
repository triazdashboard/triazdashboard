  <meta charset="UTF-8" />

  <title>Allianz Trade - Energy Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5"></script>
  <link rel="stylesheet" href="dashboard-theme.css"/>
  <style>
    /* ── Nav in header ── */
    .t-nav { display:flex; flex-direction:column; align-items:center; gap:6px; flex-shrink:0; margin:0 20px; }
    .nav-dots { display:flex; gap:10px; align-items:center; }
    .nav-dot { width:10px; height:10px; border-radius:50%; border:none;
      background:rgba(255,255,255,0.20); cursor:pointer; padding:0;
      transition:all 0.3s cubic-bezier(0.4,0,0.2,1); flex-shrink:0; }
    .nav-dot.active { background:var(--cyan); box-shadow:0 0 10px rgba(69,212,255,0.6); width:28px; border-radius:5px; }
    .nav-dot:hover:not(.active) { background:rgba(255,255,255,0.40); }
    .nav-arrows { display:flex; gap:8px; }
    .nav-arrow { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12);
      color:var(--text); border-radius:10px; padding:3px 14px;
      cursor:pointer; font-size:14px; transition:all 0.2s; line-height:1.4; }
    .nav-arrow:hover { background:rgba(255,255,255,0.14); border-color:rgba(255,255,255,0.25); }

    /* ── Main / Slides ── */
    .t-main { min-height:0; display:flex; flex-direction:column; }
    .t-loading { flex:1; }
    .slides-wrapper { flex:1; position:relative; overflow:hidden; }
    .slide { position:absolute; inset:0; opacity:0; pointer-events:none; transition:opacity 0.35s ease; display:flex; flex-direction:column; }
    .slide.active { opacity:1; pointer-events:auto; z-index:1; }
    .card { display:flex; flex-direction:column; min-height:0; flex:1; }

    /* ── Mega-card body: 2 colonne (sinistra: gauge+kpi | destra: total/partial) ── */
    .mega-body { display: flex !important; flex-direction: row; overflow: hidden; }

    .mega-left {
      flex: 0 0 26%; display: flex; flex-direction: column;
      border-right: 1px solid rgba(255,255,255,0.07);
      min-height: 0; min-width: 0; overflow: hidden;
    }
    .mega-gauge { display: none; }
    .mega-right {
      flex: 1; display: flex; flex-direction: column;
      min-height: 0; min-width: 0; overflow: hidden;
    }
    .mega-right-top  { flex: 1; position: relative; min-height: 0; overflow: hidden; }
    .mega-hdivider   { flex-shrink: 0; height: 1px; background: rgba(255,255,255,0.07); }
    .mega-right-bottom { flex: 1; position: relative; min-height: 0; overflow: hidden; }

    /* ── Calendar icon overlay ── */
    .cal-icon {
      position: absolute; top: 8px; right: 10px;
      width: 40px; height: 40px;
      fill: none;
      stroke: rgba(255,255,255,0.75);
      stroke-linecap: round; stroke-linejoin: round; stroke-width: 2.2;
      z-index: 2; pointer-events: none;
    }

    /* ── KPI panel (bottom of left column) ── */
    .ratio-kpis {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: space-evenly;
      padding: 16px 20px;
    }
    .ratio-kpi { display: flex; align-items: center; gap: 16px; }
    .ratio-kpi-icon {
      flex-shrink: 0; width: 46px; height: 46px;
      fill: rgba(255,255,255,0.82);
      filter: drop-shadow(0 0 4px rgba(255,255,255,0.18));
    }
    .ratio-kpi-icon.blue { fill: #4c7dff; filter: drop-shadow(0 0 5px rgba(76,125,255,0.5)); }
    .ratio-kpi-icon.yellow { fill: #f6c344; filter: drop-shadow(0 0 5px rgba(246,195,68,0.5)); }
    .ratio-kpi-icon.cyan { fill: #45d4ff; filter: drop-shadow(0 0 5px rgba(69,212,255,0.5)); }
    .ratio-kpi-icon.green { fill: #33d17a; filter: drop-shadow(0 0 5px rgba(51,209,122,0.5)); }
    .ratio-kpi-info { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
    .ratio-kpi-value { font-size: 24px; font-weight: 700; line-height: 1.1; white-space: nowrap; }
    .ratio-kpi-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
  </style>
</head>

  <script>
    const COLORS = {
      total: '#4c7dff',
      fv: '#33d17a',
      frigo: '#ff9f43',
      mensa: '#33d17a',
      charger: '#f6c344',
      edificio: '#a78bfa',
      cyan: '#45d4ff',
      grid: 'rgba(255,255,255,0.08)',
      text: '#f4f8ff',
      muted: '#b2c3de'
    };

    const CACHE_BUSTER = Date.now();

    async function fetchJson(path) {
      const separator = path.includes('?') ? '&' : '?';
      const url = `${path}${separator}v=${CACHE_BUSTER}`;
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(`Errore nel caricamento di ${path} (${res.status})`);
      return res.json();
    }

    function formatTimestamp(value) {
      if (!value) return null;
      const normalized = String(value).replace(' ', 'T');
      const date = new Date(normalized);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString('it-IT', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    function buildRatioChart(el, kpisId, data) {
      const chart = echarts.init(document.getElementById(el));
      const consumo = Number(data?.totale_vs_fv?.consumo || 0);
      const fv = Number(data?.totale_vs_fv?.fotovoltaico || 0);
      const ev = (data?.consumo_parziale?.series?.['Ricarica Auto Elettriche'] || [])
        .reduce(function(a, b){ return a + b; }, 0);
      const co2 = (fv * 0.75 * 0.35) + (ev * 0.1);
      const balance = consumo > 0 ? Math.min((fv / consumo) * 100, 100) : 0;

      function fmtEnergy(n) {
        if (n >= 1000) return (n / 1000).toFixed(1) + ' MWh';
        return Math.round(n) + ' kWh';
      }
      function fmtCo2(n) {
        if (n >= 1000) return (n / 1000).toFixed(1) + ' t';
        return n.toFixed(1) + ' kg';
      }

      var kpisDiv = document.getElementById(kpisId);
      if (kpisDiv) {
        kpisDiv.innerHTML =
          '<div class="ratio-kpi">' +
            '<svg class="ratio-kpi-icon blue" viewBox="0 0 48 48"><use href="#icon-electricity"/></svg>' +
            '<div class="ratio-kpi-info">' +
              '<span class="ratio-kpi-value" style="color:#4c7dff">' + fmtEnergy(consumo) + '</span>' +
              '<span class="ratio-kpi-label">Consumo Totale</span>' +
            '</div>' +
          '</div>' +
          '<div class="ratio-kpi">' +
            '<svg class="ratio-kpi-icon yellow" viewBox="0 0 260 244"><use href="#icon-solar"/></svg>' +
            '<div class="ratio-kpi-info">' +
              '<span class="ratio-kpi-value" style="color:#f6c344">' + fmtEnergy(fv) + '</span>' +
              '<span class="ratio-kpi-label">Produzione FV</span>' +
            '</div>' +
          '</div>' +
          '<div class="ratio-kpi">' +
            '<svg class="ratio-kpi-icon cyan" viewBox="0 0 496 496"><use href="#icon-ev"/></svg>' +
            '<div class="ratio-kpi-info">' +
              '<span class="ratio-kpi-value" style="color:#45d4ff">' + fmtEnergy(ev) + '</span>' +
              '<span class="ratio-kpi-label">Ricariche EV</span>' +
            '</div>' +
          '</div>' +
          '<div class="ratio-kpi">' +
            '<svg class="ratio-kpi-icon green" viewBox="0 0 32 32"><use href="#icon-co2"/></svg>' +
            '<div class="ratio-kpi-info">' +
              '<span class="ratio-kpi-value" style="color:#33d17a">' + fmtCo2(co2) + '</span>' +
              '<span class="ratio-kpi-label">CO\u2082 Evitata</span>' +
            '</div>' +
          '</div>';
      }

      // Gauge nascosta — serve solo per registerChart
      chart.setOption({ backgroundColor: 'transparent', series: [] });

      return chart;
    }

    function buildTotalChart(el, data, title) {
      const chart = echarts.init(document.getElementById(el));
      const labels = (data?.consumo_totale || []).map(x => x.label);
      const values = (data?.consumo_totale || []).map(x => Number(x.value || 0));
      const fvValues = (data?.fotovoltaico_totale || []).map(x => Number(x.value || 0));
      const hasFv = fvValues.length > 0;

      const series = [
        {
          name: 'Consumo Totale', type: 'line', smooth: true,
          symbol: 'circle', symbolSize: 6, data: values,
          lineStyle: { width: 3, color: COLORS.total },
          itemStyle: { color: COLORS.total },
          areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
            { offset: 0, color: 'rgba(76,125,255,0.45)' },
            { offset: 1, color: 'rgba(76,125,255,0.02)' }
          ])},
          markLine: { silent: true, symbol: 'none', lineStyle: { color: 'rgba(255,255,255,0.10)', type: 'dashed' }, label: { show: false }, data: [{ type: 'average' }] }
        }
      ];

      if (hasFv) {
        series.push({
          name: 'Fotovoltaico', type: 'line', smooth: true,
          symbol: 'circle', symbolSize: 6, data: fvValues,
          lineStyle: { width: 3, color: '#f6c344' },
          itemStyle: { color: '#f6c344', borderColor: '#7a5800', borderWidth: 2 },
          areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
            { offset: 0, color: 'rgba(246,195,68,0.35)' },
            { offset: 1, color: 'rgba(246,195,68,0.02)' }
          ])}
        });
      }

      chart.setOption({
        backgroundColor: 'transparent',
        animationDuration: 900,
        legend: hasFv ? {
          top: 4, right: 12,
          itemGap: 14, itemWidth: 10, itemHeight: 10,
          textStyle: { color: COLORS.muted, fontSize: 11 }
        } : { show: false },
        tooltip: {
          trigger: 'axis', backgroundColor: 'rgba(7,17,31,0.96)', borderWidth: 0,
          textStyle: { color: '#fff' },
          formatter: params => params.map(p =>
            `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.color};margin-right:5px"></span>${p.seriesName}: <b>${p.value}</b> kWh`
          ).join('<br/>')
        },
        grid: { left: 55, right: 18, top: hasFv ? 32 : 20, bottom: 38 },
        xAxis: {
          type: 'category', data: labels, boundaryGap: false,
          axisLabel: { color: COLORS.muted, fontSize: 13, hideOverlap: true },
          axisLine: { lineStyle: { color: 'rgba(255,255,255,0.12)' } },
          splitLine: { show: true, lineStyle: { color: 'rgba(255,255,255,0.06)', type: 'dashed' } }
        },
        yAxis: {
          type: 'value',
          axisLabel: { color: COLORS.muted, fontSize: 13, hideOverlap: true },
          splitLine: { lineStyle: { color: COLORS.grid } }
        },
        series
      });
      return chart;
    }

    function buildPartialChart(el, data) {
      const chart = echarts.init(document.getElementById(el));
      const labels = data?.consumo_parziale?.labels || [];
      const seriesData = data?.consumo_parziale?.series || {};
      const series = [];
      const seriesMap = [
        { key: 'Consumo Gruppi Frigo',     color: COLORS.frigo },
        { key: 'Consumo Mensa',            color: COLORS.mensa },
        { key: 'Ricarica Auto Elettriche', color: COLORS.cyan },
        { key: 'Consumo Edificio',         color: COLORS.edificio }
      ];
      for (const entry of seriesMap) {
        if (seriesData[entry.key]) {
          series.push({
            name: entry.key, type: 'line', smooth: true,
            symbol: 'circle', symbolSize: 5,
            data: seriesData[entry.key].map(v => Number(v || 0)),
            lineStyle: { width: 3, color: entry.color },
            itemStyle: { color: entry.color, borderWidth: 2 },
            showSymbol: false, emphasis: { focus: 'series' }
          });
        }
      }
      chart.setOption({
        backgroundColor: 'transparent',
        animationDuration: 900,
        tooltip: { trigger: 'axis', backgroundColor: 'rgba(7,17,31,0.96)', borderWidth: 0, textStyle: { color: '#fff' } },
        legend: {
          bottom: 4, itemGap: 16, itemWidth: 12, itemHeight: 12,
          textStyle: { color: COLORS.muted, fontSize: 11 },
          formatter: name => ({ 'Consumo Gruppi Frigo': 'Gruppi Frigo', 'Consumo Mensa': 'Mensa', 'Ricarica Auto Elettriche': 'Ricarica Auto', 'Consumo Edificio': 'Edificio' }[name] || name)
        },
        grid: { left: 55, right: 18, top: 16, bottom: 52 },
        xAxis: {
          type: 'category', data: labels, boundaryGap: false,
          axisLabel: { color: COLORS.muted, fontSize: 12, hideOverlap: true },
          axisLine: { lineStyle: { color: 'rgba(255,255,255,0.12)' } },
          splitLine: { show: true, lineStyle: { color: 'rgba(255,255,255,0.04)' } }
        },
        yAxis: {
          type: 'value',
          axisLabel: { color: COLORS.muted, fontSize: 12 },
          splitLine: { lineStyle: { color: COLORS.grid } }
        },
        series
      });
      return chart;
    }

    /* ═══════════════════════════════════════════════════
       CAROUSEL — identico al sistema occupancy
    ═══════════════════════════════════════════════════ */
    const TOTAL_SLIDES = 3;
    const SLIDE_META = [
      { subtitle: 'Consumi elettrici e produzione fotovoltaica · ieri' },
      { subtitle: 'Consumi elettrici e produzione fotovoltaica · ultima settimana' },
      { subtitle: 'Consumi elettrici e produzione fotovoltaica · ultimo mese' }
    ];

    const allCharts = [];
    const chartsPerSlide = { 0: [], 1: [], 2: [] };
    const chartByEl = new Map();
    const slideInited = new Set();
    let rawDataStore = null;
    let currentSlide = 0;
    let autoTimer = null;

    const resizeObserver = new ResizeObserver(function(entries) {
      entries.forEach(function(entry) {
        const c = chartByEl.get(entry.target);
        if (c) c.resize();
      });
    });

    function registerChart(el, chart, slideIdx) {
      allCharts.push(chart);
      chartsPerSlide[slideIdx].push(chart);
      chartByEl.set(el, chart);
      resizeObserver.observe(el);
      return chart;
    }

    const slides = document.querySelectorAll('.slide');
    const dots   = document.querySelectorAll('.nav-dot');

    function goToSlide(idx) {
      const target = ((idx % TOTAL_SLIDES) + TOTAL_SLIDES) % TOTAL_SLIDES;
      if (target === currentSlide) return;
      slides[currentSlide].classList.remove('active');
      dots[currentSlide].classList.remove('active');
      currentSlide = target;
      slides[currentSlide].classList.add('active');
      dots[currentSlide].classList.add('active');
      document.getElementById('tSub').textContent = SLIDE_META[currentSlide].subtitle;
      var hash = '#slide-' + currentSlide;
      if (location.hash !== hash) history.replaceState(null, '', hash);
      if (rawDataStore && !slideInited.has(currentSlide)) initSlide(currentSlide);
      setTimeout(function() {
        (chartsPerSlide[currentSlide] || []).forEach(function(c){ c.resize(); });
      }, 50);
      resetAutoAdvance();
    }

    function startAutoAdvance() {
      stopAutoAdvance();
      autoTimer = setInterval(function(){ goToSlide(currentSlide + 1); }, 120000);
    }
    function stopAutoAdvance()  { if (autoTimer) { clearInterval(autoTimer); autoTimer = null; } }
    function resetAutoAdvance() { startAutoAdvance(); }

    document.getElementById('prevBtn').addEventListener('click', function(){ goToSlide(currentSlide - 1); });
    document.getElementById('nextBtn').addEventListener('click', function(){ goToSlide(currentSlide + 1); });
    dots.forEach(function(dot) {
      dot.addEventListener('click', function(){ goToSlide(parseInt(dot.dataset.slide)); });
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowLeft')  goToSlide(currentSlide - 1);
      if (e.key === 'ArrowRight') goToSlide(currentSlide + 1);
    });
    window.addEventListener('hashchange', function() {
      var m = location.hash.match(/^#slide-(\d+)$/);
      if (m) goToSlide(parseInt(m[1]));
    });
    var container = document.getElementById('slidesContainer');
    container.addEventListener('mouseenter', stopAutoAdvance);
    container.addEventListener('mouseleave', startAutoAdvance);

    /* ═══════════════════════════════════════════════════
       LAZY SLIDE INIT
    ═══════════════════════════════════════════════════ */
    function initSlide(idx) {
      if (slideInited.has(idx) || !rawDataStore) return;
      slideInited.add(idx);
      const rd = rawDataStore;
      if (idx === 0) {
        const domR = document.getElementById('chart-ratio-24h');
        const domT = document.getElementById('chart-total-24h');
        const domP = document.getElementById('chart-partial-24h');
        registerChart(domR, buildRatioChart('chart-ratio-24h', 'kpis-ratio-24h', rd.d24), 0);
        registerChart(domT, buildTotalChart('chart-total-24h', rd.d24), 0);
        registerChart(domP, buildPartialChart('chart-partial-24h', rd.d24), 0);
      }
      if (idx === 1) {
        const domR = document.getElementById('chart-ratio-7d');
        const domT = document.getElementById('chart-total-7d');
        const domP = document.getElementById('chart-partial-7d');
        registerChart(domR, buildRatioChart('chart-ratio-7d', 'kpis-ratio-7d', rd.d7), 1);
        registerChart(domT, buildTotalChart('chart-total-7d', rd.d7), 1);
        registerChart(domP, buildPartialChart('chart-partial-7d', rd.d7), 1);
      }
      if (idx === 2) {
        const domR = document.getElementById('chart-ratio-30d');
        const domT = document.getElementById('chart-total-30d');
        const domP = document.getElementById('chart-partial-30d');
        registerChart(domR, buildRatioChart('chart-ratio-30d', 'kpis-ratio-30d', rd.d30), 2);
        registerChart(domT, buildTotalChart('chart-total-30d', rd.d30), 2);
        registerChart(domP, buildPartialChart('chart-partial-30d', rd.d30), 2);
      }
    }

    async function init() {
      const results = await Promise.allSettled([
        fetchJson('./data/24h.json'),
        fetchJson('./data/7d.json'),
        fetchJson('./data/30d.json')
      ]);
      const failed = results.filter(r => r.status === 'rejected');
      if (failed.length) throw new Error(`Caricamento dati incompleto (${failed.length}/3 file mancanti o non validi)`);

      const [d24, d7, d30] = results.map(r => r.value);
      rawDataStore = { d24, d7, d30 };

      const lastUpdated = [d24.updated_at, d7.updated_at, d30.updated_at].filter(Boolean).sort().slice(-1)[0];
      const formattedUpdate = formatTimestamp(lastUpdated);
      document.getElementById('tUpdate').textContent =
        formattedUpdate ? `Ultimo aggiornamento: ${formattedUpdate}` : 'Dati aggiornati';

      document.getElementById('loading').style.display = 'none';
      document.getElementById('slidesContainer').style.display = 'block';

      // Init slide 0, attiva e avvia carousel
      initSlide(0);
      slides[0].classList.add('active');
      dots[0].classList.add('active');

      // Hash deep-link
      var m = location.hash.match(/^#slide-(\d+)$/);
      if (m) {
        var startIdx = Math.min(parseInt(m[1]), TOTAL_SLIDES - 1);
        if (startIdx > 0) goToSlide(startIdx);
      }

      startAutoAdvance();
    }

    init().catch(err => {
      document.getElementById('loading').textContent = `Errore caricamento dashboard: ${err.message}`;
      console.error(err);
    });

    setTimeout(() => location.reload(), 60 * 60 * 1000);
  </script>
</body>
</html>
